<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>⚡ NEON PASS 2026</title>
    <style>
        /* ===== СБРОС И ТЕМНАЯ ТЕМА ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0c10;
            --surface: #14181c;
            --surface-light: #1e2429;
            --text: #e0e0e0;
            --text-dim: #a0a8b0;
            --neon-blue: #00f0ff;
            --neon-green: #00ff9d;
            --neon-red: #ff3b6f;
            --neon-cyan: #0ff;
            --neon-purple: #b388ff;
            --border-dim: #2a323a;
            --glow: 0 0 10px rgba(0, 240, 255, 0.5);
            --glow-green: 0 0 10px rgba(0, 255, 157, 0.5);
            --glow-red: 0 0 10px rgba(255, 59, 111, 0.5);
            --radius: 20px;
            --radius-sm: 14px;
            --transition: 0.15s ease;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            line-height: 1.4;
            -webkit-tap-highlight-color: transparent;
            text-rendering: optimizeLegibility;
        }

        .generator {
            max-width: 860px;
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px var(--neon-blue) inset, 0 0 20px rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(4px);
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--neon-blue);
            padding-bottom: 16px;
        }

        .title {
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-blue);
            color: var(--neon-cyan);
        }

        .length-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface-light);
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid var(--neon-blue);
            box-shadow: var(--glow);
        }

        .length-control label {
            font-weight: 500;
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .length-control input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid var(--border-dim);
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            background: var(--bg);
            color: var(--neon-green);
            outline: none;
            transition: var(--transition);
            box-shadow: 0 0 5px var(--neon-green);
        }

        .length-control input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* ===== СЕТКА КАТЕГОРИЙ ===== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .category-card {
            background: var(--surface-light);
            border-radius: var(--radius-sm);
            padding: 18px 12px 12px;
            border: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .category-card.active {
            border-color: var(--neon-blue);
            box-shadow: var(--glow), 0 4px 15px rgba(0, 240, 255, 0.3);
        }

        /* Иконка-кнопка включения */
        .icon-toggle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-size: 2.4rem;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            box-shadow: 0 0 0 0 transparent;
        }

        .category-card.active .icon-toggle {
            border-color: var(--neon-blue);
            background: var(--surface);
            color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.02);
        }

        .icon-toggle:active {
            transform: scale(0.94);
        }

        /* Контейнер для названия и счётчика */
        .cat-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 10px;
            border-radius: 30px;
            margin-bottom: 10px;
            border: 1px solid var(--border-dim);
        }

        .cat-label {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cat-counter {
            font-weight: 700;
            font-size: 1rem;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            background: var(--bg);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--neon-green);
            min-width: 30px;
            text-align: center;
        }

        /* Бусты */
        .boosts {
            display: flex;
            gap: 8px;
            width: 100%;
            justify-content: center;
            margin-top: 4px;
        }

        .boost-btn {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            color: #000;
            background: var(--surface);
            border: 1px solid;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            font-weight: 900;
        }

        .boost-btn.red {
            border-color: var(--neon-red);
            color: var(--neon-red);
            text-shadow: 0 0 5px var(--neon-red);
        }
        .boost-btn.red.active {
            background: var(--neon-red);
            color: #000;
            box-shadow: 0 0 20px var(--neon-red);
            border-color: var(--neon-red);
        }
        .boost-btn.green {
            border-color: var(--neon-green);
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }
        .boost-btn.green.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
            border-color: var(--neon-green);
        }
        .boost-btn:active {
            transform: scale(0.94);
        }

        /* ===== ПОЛЕ ПАРОЛЯ И КНОПКИ ===== */
        .result-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 24px;
        }

        .password-field-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 60px;
            border: 2px solid var(--neon-blue);
            padding: 4px 4px 4px 24px;
            box-shadow: var(--glow), 0 0 30px rgba(0,240,255,0.2);
        }

        .password-field-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 1.4rem;
            font-family: 'Fira Code', 'SF Mono', monospace;
            padding: 16px 0;
            outline: none;
            color: var(--neon-green);
            text-shadow: 0 0 6px var(--neon-green);
            letter-spacing: 1px;
            width: 100%;
        }

        .action-buttons {
            display: flex;
            gap: 14px;
            justify-content: flex-end;
        }

        .action-btn {
            border: none;
            color: #000;
            font-size: 1.2rem;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: var(--surface-light);
            border: 1px solid;
            box-shadow: 0 6px 0 rgba(0,0,0,0.6);
        }

        .action-btn.regenerate-btn {
            border-color: var(--neon-purple);
            color: var(--neon-purple);
            text-shadow: 0 0 6px var(--neon-purple);
        }
        .action-btn.regenerate-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #000;
        }

        .action-btn.copy-btn {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            text-shadow: 0 0 6px var(--neon-blue);
        }
        .action-btn.copy-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #000;
        }

        /* ===== ТОСТ ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface-light);
            color: var(--neon-cyan);
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 600;
            box-shadow: 0 0 30px var(--neon-blue), 0 0 0 1px var(--neon-blue);
            border: 1px solid var(--neon-cyan);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .toast.show {
            opacity: 1;
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 700px) {
            .generator {
                padding: 20px;
            }
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
            .icon-toggle {
                width: 56px;
                height: 56px;
                font-size: 2rem;
            }
            .cat-info {
                padding: 4px 8px;
            }
            .action-buttons {
                flex-direction: column;
                gap: 10px;
            }
            .action-btn {
                justify-content: center;
                width: 100%;
            }
        }

        @media (max-width: 450px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 1.4rem;
            }
            .length-control {
                width: 100%;
            }
        }

        /* Стили для счетчиков */
        .category-card .cat-counter {
            transition: 0.1s;
        }
    </style>
</head>
<body>
    <div class="generator">
        <div class="header">
            <span class="title">⚡ NEON SECURE 2026</span>
            <div class="length-control">
                <label for="length">длина</label>
                <input type="number" id="length" min="1" max="999" value="24" step="1">
            </div>
        </div>

        <!-- Категории -->
        <div class="categories-grid" id="categoriesContainer"></div>

        <!-- Результат -->
        <div class="result-area">
            <div class="password-field-wrapper">
                <input type="text" id="passwordOutput" readonly value="Init#G@L4xy" placeholder="сгенерированный пароль">
            </div>
            <div class="action-buttons">
                <button class="action-btn regenerate-btn" id="regenerateBtn">
                    <span>⟳</span> перезапуск
                </button>
                <button class="action-btn copy-btn" id="copyBtn">
                    <span>📋</span> копировать
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Скопировано</div>

    <script>
        (function() {
            // ===== НАБОРЫ СИМВОЛОВ =====
            const CHAR_SETS = {
                latUpper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
                latLower: 'abcdefghijklmnopqrstuvwxyz'.split(''),
                cyrUpper: 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split(''),
                cyrLower: 'абвгдеёжзийклмнопрстуфхцчшщъыьэюя'.split(''),
                digits: '0123456789'.split(''),
                simpleSpecial: '!"№;%:?*()_+'.split(''),
                extraSpecial: '@#$^&*[]{}<>\\|/'.split('')
            };

            // Категории с иконками, кириллица по умолчанию выключена
            const categories = [
                { id: 'latUpper', name: 'ЗАГЛ ЛАТ', icon: '🔠', set: CHAR_SETS.latUpper, active: true },
                { id: 'latLower', name: 'ПРОП ЛАТ', icon: '🔡', set: CHAR_SETS.latLower, active: true },
                { id: 'cyrUpper', name: 'ЗАГЛ КИР', icon: '🔤', set: CHAR_SETS.cyrUpper, active: false },
                { id: 'cyrLower', name: 'ПРОП КИР', icon: '📝', set: CHAR_SETS.cyrLower, active: false },
                { id: 'digits', name: 'ЦИФРЫ', icon: '🔢', set: CHAR_SETS.digits, active: true },
                { id: 'simpleSpecial', name: 'ПРОСТЫЕ', icon: '#️⃣', set: CHAR_SETS.simpleSpecial, active: true },
                { id: 'extraSpecial', name: 'СЛОЖНЫЕ', icon: '🔣', set: CHAR_SETS.extraSpecial, active: true }
            ];

            // Состояние приложения
            let state = {
                length: 24,
                categories: categories.map(c => ({
                    ...c,
                    boost250: false,
                    boost500: false
                }))
            };

            // DOM элементы
            const container = document.getElementById('categoriesContainer');
            const lengthInput = document.getElementById('length');
            const passwordOutput = document.getElementById('passwordOutput');
            const copyBtn = document.getElementById('copyBtn');
            const regenerateBtn = document.getElementById('regenerateBtn');
            const toast = document.getElementById('toast');

            // Тост
            function showToast(text, duration = 1500) {
                toast.textContent = text;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), duration);
            }

            // Проверка лимитов бустов
            function canActivateBoost(catIndex, color, currentState) {
                const cats = currentState.categories;
                if (color === 'red') {
                    const redCount = cats.filter(c => c.boost250).length;
                    if (!cats[catIndex].boost250 && redCount >= 2) {
                        showToast('⚠️ МАКС 2 КРАСНЫХ', 1000);
                        return false;
                    }
                } else if (color === 'green') {
                    const greenCount = cats.filter(c => c.boost500).length;
                    if (!cats[catIndex].boost500 && greenCount >= 1) {
                        showToast('⚠️ ТОЛЬКО 1 ЗЕЛЁНЫЙ', 1000);
                        return false;
                    }
                }
                return true;
            }

            // Рендер карточек
            function render() {
                let html = '';
                state.categories.forEach((cat, idx) => {
                    const activeClass = cat.active ? 'active' : '';
                    const redActive = cat.boost250 ? 'active' : '';
                    const greenActive = cat.boost500 ? 'active' : '';

                    html += `
                        <div class="category-card ${activeClass}" data-index="${idx}">
                            <div class="icon-toggle" data-action="toggleCat" data-index="${idx}">${cat.icon}</div>
                            <div class="cat-info">
                                <span class="cat-label">${cat.name}</span>
                                <span class="cat-counter" id="counter-${idx}">0</span>
                            </div>
                            <div class="boosts">
                                <button class="boost-btn red ${redActive}" data-action="boostRed" data-index="${idx}">250%</button>
                                <button class="boost-btn green ${greenActive}" data-action="boostGreen" data-index="${idx}">500%</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // Обработчики
                document.querySelectorAll('[data-action="toggleCat"]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const index = el.dataset.index;
                        toggleCategory(parseInt(index));
                    });
                });

                document.querySelectorAll('[data-action="boostRed"]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const index = el.dataset.index;
                        toggleBoost(parseInt(index), 'red');
                    });
                });

                document.querySelectorAll('[data-action="boostGreen"]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const index = el.dataset.index;
                        toggleBoost(parseInt(index), 'green');
                    });
                });
            }

            // Переключение категории
            function toggleCategory(index) {
                const cat = state.categories[index];
                cat.active = !cat.active;
                if (!cat.active) {
                    cat.boost250 = false;
                    cat.boost500 = false;
                }
                render();
                generatePassword();
            }

            // Переключение бустов
            function toggleBoost(index, color) {
                const cat = state.categories[index];
                if (!cat.active) return;

                if (color === 'red') {
                    if (cat.boost250) {
                        cat.boost250 = false;
                    } else {
                        if (!canActivateBoost(index, 'red', state)) return;
                        cat.boost250 = true;
                    }
                } else if (color === 'green') {
                    if (cat.boost500) {
                        cat.boost500 = false;
                    } else {
                        if (!canActivateBoost(index, 'green', state)) return;
                        state.categories.forEach((c, i) => {
                            if (i !== index) c.boost500 = false;
                        });
                        cat.boost500 = true;
                    }
                }
                render();
                generatePassword();
            }

            // Распределение количества символов по весам
            function distributeLength() {
                const activeCats = state.categories.filter(c => c.active);
                if (activeCats.length === 0) return new Array(state.categories.length).fill(0);

                const weights = activeCats.map(c => {
                    let w = 1;
                    if (c.boost250) w += 1.5;
                    if (c.boost500) w += 4;
                    return w;
                });

                const totalWeight = weights.reduce((a, b) => a + b, 0);
                const L = state.length;

                let rawCounts = activeCats.map((_, i) => (L * weights[i]) / totalWeight);
                let floors = rawCounts.map(v => Math.floor(v));
                let remainder = L - floors.reduce((a, b) => a + b, 0);

                const indexes = [...Array(activeCats.length).keys()];
                indexes.sort((a, b) => (rawCounts[b] - floors[b]) - (rawCounts[a] - floors[a]));

                for (let i = 0; i < remainder; i++) {
                    floors[indexes[i % indexes.length]] += 1;
                }

                const result = new Array(state.categories.length).fill(0);
                let activeIdx = 0;
                state.categories.forEach((cat, idx) => {
                    if (cat.active) {
                        result[idx] = floors[activeIdx++];
                    }
                });
                return result;
            }

            // Обновление счётчиков на карточках
            function updateCounters(distribution) {
                distribution.forEach((count, idx) => {
                    const counterEl = document.getElementById(`counter-${idx}`);
                    if (counterEl) counterEl.textContent = count;
                });
            }

            // Генерация пароля
            function generatePassword() {
                const distribution = distributeLength();
                const totalLength = distribution.reduce((a, b) => a + b, 0);
                if (totalLength === 0) {
                    passwordOutput.value = '';
                    updateCounters(distribution);
                    return;
                }

                // Построение порядка категорий
                let order = [];
                distribution.forEach((count, catIdx) => {
                    for (let i = 0; i < count; i++) order.push(catIdx);
                });
                // Перемешиваем
                for (let i = order.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [order[i], order[j]] = [order[j], order[i]];
                }

                const maxFreq = Math.max(1, Math.floor(state.length * 3 / 24));
                const charCount = new Map();
                let lastChar = '', secondLast = '';
                const passwordChars = [];

                for (let pos = 0; pos < order.length; pos++) {
                    const catIdx = order[pos];
                    const category = state.categories[catIdx];
                    const charSet = category.set;

                    if (charSet.length === 0) {
                        passwordChars.push('?');
                        continue;
                    }

                    const randomItem = (arr) => arr[Math.floor(Math.random() * arr.length)];

                    let attempts = 0, maxAttempts = 200, chosen = null;

                    // Уровень 1: все ограничения
                    while (attempts < maxAttempts) {
                        const candidate = randomItem(charSet);
                        if (candidate === lastChar) continue;
                        if (candidate === secondLast) continue;
                        if ((charCount.get(candidate) || 0) >= maxFreq) continue;
                        chosen = candidate;
                        break;
                    }

                    // Уровень 2: разрешить через один
                    if (chosen === null) {
                        attempts = 0;
                        while (attempts < maxAttempts) {
                            const candidate = randomItem(charSet);
                            if (candidate === lastChar) continue;
                            if ((charCount.get(candidate) || 0) >= maxFreq) continue;
                            chosen = candidate;
                            break;
                        }
                    }

                    // Уровень 3: только частота
                    if (chosen === null) {
                        attempts = 0;
                        while (attempts < maxAttempts) {
                            const candidate = randomItem(charSet);
                            if ((charCount.get(candidate) || 0) >= maxFreq) continue;
                            chosen = candidate;
                            break;
                        }
                    }

                    // Уровень 4: вообще без ограничений
                    if (chosen === null) chosen = randomItem(charSet);

                    passwordChars.push(chosen);
                    charCount.set(chosen, (charCount.get(chosen) || 0) + 1);
                    secondLast = lastChar;
                    lastChar = chosen;
                }

                passwordOutput.value = passwordChars.join('');
                updateCounters(distribution);
            }

            // Копирование
            copyBtn.addEventListener('click', () => {
                if (!passwordOutput.value) return;
                navigator.clipboard.writeText(passwordOutput.value).then(() => {
                    showToast('✅ СКОПИРОВАНО');
                }).catch(() => {
                    passwordOutput.select();
                    document.execCommand('copy');
                    showToast('✅ СКОПИРОВАНО (FALLBACK)');
                });
            });

            // Перегенерация (с "очисткой кеша" через новый вызов)
            regenerateBtn.addEventListener('click', () => {
                generatePassword();
                showToast('🔄 ПЕРЕГЕНЕРИРОВАНО', 1000);
            });

            // Изменение длины
            lengthInput.addEventListener('input', (e) => {
                let val = parseInt(e.target.value, 10);
                if (isNaN(val) || val < 1) val = 1;
                if (val > 999) val = 999;
                state.length = val;
                lengthInput.value = val;
                generatePassword();
            });

            // Инициализация
            render();
            generatePassword();
        })();
    </script>
</body>
</html>
