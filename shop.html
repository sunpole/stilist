<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>SUNPOLE · STEAM-ХАБ</title>
    <!-- Open Graph / предпросмотр (укажите свои ссылки) -->
    <meta property="og:title" content="SUNPOLE Game Store — коллекция проектов">
    <meta property="og:description" content="Все мои эксперименты, игры и генераторы в стиле Steam">
    <meta property="og:image" content="https://github.com/sunpole/stilist/raw/main/pass/Screenshot.jpg">
    <meta property="og:url" content="https://sunpole.github.io/stilist/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        /* ===== СБРОС И ПЕРЕМЕННЫЕ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --steam-bg: #1b2838;
            --steam-dark: #171a21;
            --steam-panel: #2a3f4e;
            --steam-card: #1f2e3a;
            --steam-card-hover: #2a475e;
            --steam-text: #c7d5e0;
            --steam-text-light: #e9f2f7;
            --steam-accent: #66c0f4;
            --steam-accent-glow: rgba(102, 192, 244, 0.4);
            --steam-discount: #4c6b22;
            --steam-price: #beee11;
            --radius: 8px;
            --transition: 0.2s ease;
        }

        body {
            background-color: var(--steam-bg);
            background-image: radial-gradient(circle at 20% 30%, #2a4a5a 0%, #1b2838 80%);
            color: var(--steam-text);
            min-height: 100vh;
            line-height: 1.5;
            padding: 0 20px 40px;
        }

        /* ===== ШАПКА (STEAM STYLE) ===== */
        .header {
            max-width: 1400px;
            margin: 0 auto 30px;
            padding: 20px 0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid #2a3f4e;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px var(--steam-accent));
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--steam-text-light);
            text-transform: uppercase;
        }

        .logo span {
            font-weight: 700;
            color: var(--steam-accent);
        }

        .search-bar {
            display: flex;
            background: var(--steam-dark);
            border-radius: 30px;
            border: 1px solid #3a4f5e;
            overflow: hidden;
            width: 300px;
            transition: var(--transition);
        }

        .search-bar:focus-within {
            border-color: var(--steam-accent);
            box-shadow: 0 0 15px var(--steam-accent-glow);
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--steam-text);
            font-size: 1rem;
            outline: none;
        }

        .search-bar input::placeholder {
            color: #5a7a8a;
            font-style: italic;
        }

        .search-bar button {
            background: var(--steam-panel);
            border: none;
            color: var(--steam-text);
            padding: 0 20px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .search-bar button:hover {
            background: var(--steam-accent);
            color: #000;
        }

        /* ===== СЕТКА ПРОЕКТОВ ===== */
        .projects-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* КАРТОЧКА (STEAM ИГРЫ) */
        .project-card {
            background: var(--steam-card);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition);
            cursor: pointer;
            border: 1px solid #2a3f4e;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8), 0 0 0 2px var(--steam-accent) inset;
            border-color: var(--steam-accent);
        }

        /* область изображения – теперь всегда квадратная пропорция */
        .card-image {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* квадрат */
            background: linear-gradient(145deg, #2a4a5a, #1f2e3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--steam-accent);
            text-shadow: 0 0 15px var(--steam-accent);
            border-bottom: 2px solid var(--steam-accent);
            overflow: hidden;
        }

        .card-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* заполняет весь квадрат, обрезая лишнее */
            object-position: center;
        }

        /* эмблема "новинка" / бейдж */
        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--steam-accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--steam-accent);
            z-index: 2;
        }

        .card-content {
            padding: 16px 14px 14px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--steam-text-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #8ba0b0;
        }

        .card-platform {
            background: var(--steam-panel);
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* теги */
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 6px;
            margin-bottom: 10px;
        }

        .card-tag {
            background: #2a3f4e;
            color: #acbfcc;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: lowercase;
        }

        .card-description {
            font-size: 0.9rem;
            color: #acbfcc;
            line-height: 1.4;
            margin-bottom: 15px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #2a3f4e;
            padding-top: 12px;
            margin-top: auto;
        }

        .card-price {
            font-weight: 700;
            color: var(--steam-price);
            font-size: 1.2rem;
        }

        .card-price small {
            font-size: 0.7rem;
            color: #5a7a8a;
            text-decoration: line-through;
            margin-right: 6px;
        }

        .card-btn {
            background: var(--steam-accent);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            box-shadow: 0 3px 0 #1a4c6e;
        }

        .card-btn:hover {
            background: #7ac6f5;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #1a4c6e;
        }

        .card-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1a4c6e;
        }

        /* сообщение если ничего не найдено */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            font-size: 1.4rem;
            color: #5a7a8a;
            background: var(--steam-card);
            border-radius: var(--radius);
            border: 2px dashed #2a3f4e;
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .search-bar {
                width: 100%;
            }
            .projects-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }
            .card-image {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 450px) {
            .logo h1 {
                font-size: 1.6rem;
            }
        }

        /* полоса прокрутки как в steam */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--steam-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--steam-panel);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--steam-accent);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🎮</span>
            <h1><span>SUN</span>POLE · HUB</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="поиск проектов...">
            <button id="searchBtn">🔍</button>
        </div>
    </header>

    <main class="projects-grid" id="projectsGrid"></main>

    <script>
        // =====================================================================
        // МАССИВ ПРОЕКТОВ – добавляй сюда новые папки в формате:
        // {
        //   name: "Название",
        //   folder: "путь/к/папке" (если файл .html — указывай полное имя),
        //   description: "Краткое описание",
        //   image: "🚀" (эмодзи-заглушка, если нет скриншота),
        //   imageUrl: "https://...", // ссылка на скриншот (необязательно)
        //   platform: "WEB",
        //   tags: ["web", "игра", ...], // массив тегов (необязательно)
        //   price: "FREE",
        //   badge: "НОВИНКА" (необязательно)
        // }
        // =====================================================================
        const projects = [
            { name: "Simple Clicker RPG", folder: "101", description: "RPG-кликер с магазином, сохранениями и Phaser", image: "101", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/101/stilist_101.jpg", platform: "WEB", tags: ["web", "игра", "кликер", "rpg", "phaser", "сохранения"], price: "1,00$", badge: "RPG" },
            { name: "Idle Miner", folder: "102", description: "Шахтёрский симулятор с автоматической добычей", image: "102", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/102/stilist_102.jpg", platform: "WEB", tags: ["игра", "кликер", "idle", "симулятор", "шахта", "ресурсы", "инкрементальная"], price: "10,00$", badge: "IDLE" },
            { name: "Lетучие клетки", folder: "2025", description: "Головоломка 3×3 с переключением клеток", image: "2025", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/2025/stilist_2025.jpg", platform: "WEB", tags: ["игра", "головоломка", "логическая", "lights-out", "javascript", "адаптивная"], price: "10,00$", badge: "PUZZLE" },
            { name: "Расчет раскладки изделий на печатном листе", folder: "320", description: "Оптимизация размещения изделий на печатном листе", image: "320", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/320/stilist_320.jpg", platform: "WEB", tags: ["инструмент", "калькулятор", "раскладка", "печать", "производство", "prepress"], price: "10,00$", badge: "PRINT-TOOL" },
            { name: "Конвертер мм ↔ пиксели", folder: "350", description: "Конвертер миллиметров в пиксели и обратно с настройкой PPI", image: "350", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/350/preview.jpg", platform: "WEB", tags: ["инструмент", "конвертер", "мм", "пиксели", "ppi", "дизайн"], price: "10,00$", badge: "CONVERTER" },
            { name: "Калькулятор полиграфических операций", folder: "3501", description: "6 операций УФ-лакирования и фольгирования", image: "3501", imageUrl: "https://raw.githubusercontent.com/sunpole/stilist/refs/heads/main/3501/stilist_3501.jpg", platform: "WEB", tags: ["инструмент", "полиграфия", "калькулятор", "печать", "производство"], price: "10,00$", badge: "PRINT" },
            
            
            
            
        ];

        // Функция рендеринга карточек
        function renderProjects(filterText = "") {
            const grid = document.getElementById("projectsGrid");
            const searchLower = filterText.toLowerCase().trim();
            
            let filtered = projects;
            if (searchLower !== "") {
                filtered = projects.filter(p => 
                    p.name.toLowerCase().includes(searchLower) || 
                    (p.description && p.description.toLowerCase().includes(searchLower)) ||
                    (p.tags && p.tags.some(tag => tag.toLowerCase().includes(searchLower)))
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">🔍 По запросу «${filterText}» ничего не найдено</div>`;
                return;
            }

            let html = "";
            filtered.forEach(proj => {
                // формируем ссылку: если folder заканчивается на .html, то прямой файл, иначе папка + /index.html
                let link;
                if (proj.folder.endsWith('.html')) {
                    link = proj.folder;
                } else {
                    link = `${proj.folder}/index.html`;
                }

                // бейдж
                const badgeHtml = proj.badge ? `<span class="card-badge">${proj.badge}</span>` : "";

                // изображение: если есть imageUrl, ставим <img>, иначе эмодзи
                let imageHtml = proj.image || "📦";
                if (proj.imageUrl) {
                    imageHtml = `<img src="${proj.imageUrl}" alt="${proj.name}" onerror="this.style.display='none'; this.parentNode.innerHTML='${proj.image || '📦'}';">`;
                }

                // цена
                let priceHtml = `<span class="card-price">${proj.price}</span>`;
                if (proj.price === "FREE") {
                    priceHtml = `<span class="card-price">Бесплатно</span>`;
                }

                // теги
                let tagsHtml = "";
                if (proj.tags && Array.isArray(proj.tags) && proj.tags.length) {
                    tagsHtml = '<div class="card-tags">' + 
                        proj.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('') + 
                    '</div>';
                }

                html += `
                    <div class="project-card" onclick="window.location.href='${link}'">
                        <div class="card-image">
                            ${imageHtml}
                            ${badgeHtml}
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${proj.name}</h3>
                            <div class="card-meta">
                                <span class="card-platform">${proj.platform || "WEB"}</span>
                                <span>🌐 онлайн</span>
                            </div>
                            ${tagsHtml}
                            <p class="card-description">${proj.description || "Нет описания"}</p>
                            <div class="card-footer">
                                ${priceHtml}
                                <button class="card-btn" onclick="event.stopPropagation(); window.location.href='${link}';">▶ запустить</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Обработчики поиска
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");

        function handleSearch() {
            renderProjects(searchInput.value);
        }

        searchBtn.addEventListener("click", handleSearch);
        searchInput.addEventListener("keyup", (e) => {
            if (e.key === "Enter") handleSearch();
        });

        // Инициализация
        renderProjects();

        // Сброс поиска при клике на лого
        document.querySelector('.logo').addEventListener('click', () => {
            searchInput.value = "";
            renderProjects();
        });
    </script>
    <!-- Добавление плавности при загрузке -->
    <style>
        .project-card { opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</body>
</html>
