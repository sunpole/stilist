<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SUNPOLE HUB — Project View V2</title>
  <style>
    :root{color-scheme:dark;--bg:#080d18;--panel:#121b2f;--card:#172338;--line:rgba(159,204,255,.16);--text:#f5f7fb;--muted:#9fb0c7;--cyan:#63f3ff;--blue:#66c0f4;--green:#8cffc1;--gold:#d88a42;--gold2:#ffd166;--violet:#b892ff;--red:#ff7b93;--html:#e34c26;--js:#f1e05a;--css:#563d7c}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,rgba(99,243,255,.18),transparent 34rem),radial-gradient(circle at 90% 8%,rgba(184,146,255,.14),transparent 28rem),linear-gradient(180deg,#060a12,#0b1120 45%,#0e1526);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}.wrap{max-width:1360px;margin:0 auto;padding:24px 18px 80px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:#08111d;background:linear-gradient(135deg,var(--cyan),var(--blue));font-weight:950;border-radius:999px;padding:10px 14px;border:0;cursor:pointer}.btn.alt{color:var(--text);background:rgba(255,255,255,.08);border:1px solid var(--line)}.hero{border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(23,35,56,.92),rgba(11,17,31,.94));box-shadow:0 24px 80px rgba(0,0,0,.45);overflow:hidden}.layout{display:grid;grid-template-columns:1.35fr .65fr;gap:0}.gallery{padding:18px;border-right:1px solid var(--line)}.screen{height:min(56vw,560px);background:#0f1728;border-radius:24px;overflow:hidden;border:1px solid var(--line);display:flex;align-items:center;justify-content:center}.screen img{width:100%;height:100%;object-fit:contain;background:#07101f}.noimg{font-size:96px}.thumbs{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.thumb{width:118px;height:70px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:rgba(255,255,255,.05);cursor:pointer}.thumb.active{outline:2px solid var(--gold2)}.thumb img{width:100%;height:100%;object-fit:cover;object-position:top center}.info{padding:24px}.kicker{color:var(--cyan);font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:12px}.title{font-size:clamp(34px,5vw,64px);line-height:.9;margin:10px 0 12px}.desc{color:var(--muted);font-size:16px;line-height:1.6}.grade{font-size:34px;font-weight:950;color:var(--gold2)}.stars{color:var(--gold2);letter-spacing:.08em}.tags{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0}.chip{background:rgba(255,255,255,.06);color:#cfe3f8;border-radius:999px;padding:5px 9px;font-size:12px}.bars{display:grid;gap:9px;margin-top:14px}.barrow{display:grid;grid-template-columns:105px 1fr 58px;gap:8px;align-items:center;font-size:12px;color:var(--muted)}.track{height:10px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--cyan))}.fill-quality{background:linear-gradient(90deg,var(--gold),var(--gold2))}.fill-readiness{background:linear-gradient(90deg,#22c55e,var(--green))}.fill-visual{background:linear-gradient(90deg,#0ea5e9,var(--cyan))}.fill-technical{background:linear-gradient(90deg,#7c3aed,var(--violet))}.fill-html{background:var(--html)}.fill-javascript{background:var(--js)}.fill-css{background:var(--css)}.hp{font-weight:900;color:#eafcff}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.section{margin-top:22px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.rel{display:block;text-decoration:none;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:12px}.rel b{display:block;margin-bottom:5px}.rel span{color:var(--muted)}.mini{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:12px}.mini b{display:block}.mini span{color:var(--muted)}@media(max-width:900px){.layout{grid-template-columns:1fr}.gallery{border-right:0;border-bottom:1px solid var(--line)}.screen{height:330px}.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a class="btn" href="hub-v5.html">← Вернуться в HUB</a><a class="btn alt" href="hub-versions.html">Контрольные версии</a></div>
    <main id="app"></main>
  </div>
  <script src="data/projects-hub.js"></script>
  <script>
    const projects=window.SUNPOLE_PROJECTS||[];const id=new URLSearchParams(location.search).get('id')||'3502';const p=projects.find(x=>x.id===id)||projects[0];const labels={main:'Основной',archive:'Архив',experiment:'Эксперимент',review:'Проверить'};
    function stars(n){return '✶'.repeat(Math.max(1,Math.min(4,n||1)))}function img(p){return p.imageUrl||p.fallbackImageUrl||''}function bar(label,val,cls=''){val=Number(val||0);return `<div class="barrow"><span>${label}</span><div class="track"><div class="fill ${cls}" style="width:${val}%"></div></div><b class="hp">${val}/100</b></div>`}function lang(l){return `<div class="barrow"><span>${l.name}</span><div class="track"><div class="fill fill-${String(l.name).toLowerCase()}" style="width:${l.percent}%"></div></div><b class="hp">${l.percent}%</b></div>`}
    const gallery=[img(p),p.fallbackImageUrl].filter(Boolean).filter((v,i,a)=>a.indexOf(v)===i);function related(){const ids=new Set(p.related||[]);projects.forEach(x=>{if(x.id!==p.id&&(x.tags||[]).some(t=>(p.tags||[]).includes(t)))ids.add(x.id)});return[...ids].map(id=>projects.find(x=>x.id===id)).filter(Boolean).slice(0,6)}
    document.title=`SUNPOLE HUB — ${p.title}`;
    document.getElementById('app').innerHTML=`<section class="hero"><div class="layout"><div class="gallery"><div class="screen" id="screen">${gallery[0]?`<img src="${gallery[0]}" onerror="this.parentNode.innerHTML='<div class=noimg>${p.icon||'📦'}</div>'">`:`<div class="noimg">${p.icon||'📦'}</div>`}</div><div class="thumbs">${gallery.map((g,i)=>`<button class="thumb ${i===0?'active':''}" data-img="${g}"><img src="${g}"></button>`).join('')||`<button class="thumb active"><div class="noimg">${p.icon||'📦'}</div></button>`}</div></div><aside class="info"><div class="kicker">${labels[p.status]||p.status} · ${p.category}</div><h1 class="title">${p.title}</h1><p class="desc">${p.description||p.note||''}</p><div class="grade">${p.quality?.grade||'C1'} <span class="stars">${stars(p.quality?.stars)}</span></div><div>${p.quality?.label||''}</div><div class="tags">${(p.tags||[]).map(t=>`<span class="chip">#${t}</span>`).join('')}</div><div class="bars">${bar('Качество',p.quality?.score,'fill-quality')}${bar('Готовность',p.metrics?.readiness,'fill-readiness')}${bar('Визуал',p.metrics?.visual,'fill-visual')}${bar('Техника',p.metrics?.technical,'fill-technical')}${bar('Документы',p.metrics?.documentation)}</div><h3>Languages</h3>${(p.tech?.languages||[]).map(lang).join('')}<div class="actions"><a class="btn" href="${p.launchUrl||p.path}">▶ Открыть проект</a><a class="btn alt" href="${p.links?.source||'#'}">GitHub</a></div></aside></div></section><section class="section"><h2>Технический паспорт</h2><div class="cards"><div class="mini"><b>ID</b><span>${p.id}</span></div><div class="mini"><b>Статус</b><span>${labels[p.status]||p.status}</span></div><div class="mini"><b>Готовность</b><span>${p.maturity}</span></div><div class="mini"><b>Источник</b><span>${p.source||'manual'}</span></div></div></section><section class="section"><h2>Похожие и связанные проекты</h2><div class="cards">${related().map(x=>`<a class="rel" href="project-view-v2.html?id=${x.id}"><b>${x.title}</b><span>${x.category} · ${x.quality?.grade||''}</span></a>`).join('')||'<span>Нет связанных проектов</span>'}</div></section>`;
    document.querySelectorAll('.thumb').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.thumb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(btn.dataset.img)document.getElementById('screen').innerHTML=`<img src="${btn.dataset.img}">`});
  </script>
</body>
</html>
