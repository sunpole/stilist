<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>🛠️ CREATED SHOP – конструктор карточек</title>
    <!-- Font Awesome 6 (бесплатный) для красивых иконок интерфейса -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg: #1b2838;
            --surface: #1f2e3a;
            --surface-light: #2a3f4e;
            --accent: #66c0f4;
            --accent-glow: rgba(102, 192, 244, 0.4);
            --text: #c7d5e0;
            --text-light: #e9f2f7;
            --border: #2a3f4e;
            --success: #4c6b22;
            --success-light: #6b8f3c;
            --radius: 10px;
            --transition: 0.2s;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #2a4a5a 0%, #1b2838 80%);
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px var(--accent) inset;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 300;
            color: var(--text-light);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h1 i {
            color: var(--accent);
            font-size: 2rem;
        }

        .subtitle {
            color: #8ba0b0;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field.full-width {
            grid-column: span 2;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            color: var(--text-light);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .helper {
            font-size: 0.8rem;
            color: #8ba0b0;
            margin-top: 4px;
        }

        .helper i {
            color: var(--accent);
            margin-right: 4px;
        }

        .output-area {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
        }

        .output-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--surface);
            padding: 0 10px;
            font-size: 0.8rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        #result {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            width: 100%;
            resize: none;
            outline: none;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn i {
            font-size: 1.2rem;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
            border-color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .btn.primary:hover {
            background: #7ac6f5;
            box-shadow: 0 0 25px var(--accent);
        }

        .preview-card {
            background: var(--surface-light);
            border-radius: 8px;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid var(--accent);
        }

        .preview-title {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-sim {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            max-width: 300px;
            margin: 0 auto;
        }

        .card-sim-image {
            height: 120px;
            background: linear-gradient(145deg, #2a4a5a, #1f2e3a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border-bottom: 2px solid var(--accent);
            position: relative;
        }

        .card-sim-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .card-sim-content {
            padding: 16px;
        }

        .card-sim-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 6px;
        }

        .card-sim-meta {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.8rem;
            color: #8ba0b0;
        }

        .card-sim-platform {
            background: var(--surface-light);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .card-sim-desc {
            font-size: 0.9rem;
            color: #acbfcc;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-sim-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 12px;
        }

        .card-sim-price {
            font-weight: 700;
            color: #beee11;
        }

        /* адаптация */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-field.full-width {
                grid-column: span 1;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <i class="fas fa-tools"></i>
            CREATED SHOP
        </h1>
        <div class="subtitle">
            <i class="fas fa-magic"></i> Заполните поля — получите готовую строку для магазина
        </div>

        <div class="form-grid">
            <div class="form-field">
                <label><i class="fas fa-tag"></i> Название проекта</label>
                <input type="text" id="name" placeholder="Генератор паролей 2026" value="Генератор паролей 2026">
            </div>
            <div class="form-field">
                <label><i class="fas fa-folder"></i> Папка / файл</label>
                <input type="text" id="folder" placeholder="pass" value="pass">
                <div class="helper"><i class="fas fa-info-circle"></i> если папка — просто имя, если файл — с .html</div>
            </div>
            <div class="form-field full-width">
                <label><i class="fas fa-align-left"></i> Описание</label>
                <textarea id="description" placeholder="Краткое описание...">Неоновый генератор с военным стилем, 7 категорий символов, бусты, счётчики.</textarea>
            </div>
            <div class="form-field">
                <label><i class="fas fa-icons"></i> Иконка (эмодзи/символ)</label>
                <input type="text" id="image" placeholder="🔐" value="🔐">
                <div class="helper">например 🔧, 🎮, 📦, можно текст</div>
            </div>
            <div class="form-field">
                <label><i class="fas fa-globe"></i> Платформа</label>
                <select id="platform">
                    <option value="WEB" selected>WEB</option>
                    <option value="PC">PC</option>
                    <option value="MOBILE">MOBILE</option>
                    <option value="ANDROID">ANDROID</option>
                    <option value="IOS">IOS</option>
                </select>
            </div>
            <div class="form-field">
                <label><i class="fas fa-coins"></i> Цена</label>
                <input type="text" id="price" placeholder="FREE" value="FREE">
            </div>
            <div class="form-field">
                <label><i class="fas fa-certificate"></i> Бейдж (опционально)</label>
                <input type="text" id="badge" placeholder="НОВИНКА">
            </div>
        </div>

        <div class="output-area">
            <div class="output-label"><i class="fas fa-code"></i> Готовая строка</div>
            <textarea id="result" rows="3" readonly></textarea>
        </div>

        <div class="actions">
            <button class="btn" id="copyBtn"><i class="fas fa-copy"></i> Копировать</button>
            <button class="btn primary" id="generateBtn"><i class="fas fa-sync-alt"></i> Сгенерировать</button>
            <button class="btn" id="fillExample"><i class="fas fa-lightbulb"></i> Пример</button>
        </div>

        <!-- Предпросмотр карточки (как она будет выглядеть в магазине) -->
        <div class="preview-card">
            <div class="preview-title"><i class="fas fa-eye"></i> Предпросмотр карточки</div>
            <div class="card-sim" id="preview">
                <!-- динамически заполняется через js -->
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM элементы
            const nameInput = document.getElementById('name');
            const folderInput = document.getElementById('folder');
            const descInput = document.getElementById('description');
            const imageInput = document.getElementById('image');
            const platformSelect = document.getElementById('platform');
            const priceInput = document.getElementById('price');
            const badgeInput = document.getElementById('badge');
            const resultTextarea = document.getElementById('result');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const fillExampleBtn = document.getElementById('fillExample');
            const previewDiv = document.getElementById('preview');

            // Функция генерации строки
            function generateString() {
                const name = nameInput.value.trim() || "Без названия";
                const folder = folderInput.value.trim() || ".";
                const description = descInput.value.trim() || "";
                const image = imageInput.value.trim() || "📦";
                const platform = platformSelect.value;
                const price = priceInput.value.trim() || "FREE";
                const badge = badgeInput.value.trim();

                // Экранирование кавычек и спецсимволов для вставки в JS объект
                function escapeStr(s) {
                    return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
                }

                let objStr = `{ name: "${escapeStr(name)}", folder: "${escapeStr(folder)}", description: "${escapeStr(description)}", image: "${escapeStr(image)}", platform: "${escapeStr(platform)}", price: "${escapeStr(price)}"`;
                if (badge) {
                    objStr += `, badge: "${escapeStr(badge)}"`;
                }
                objStr += ` },`;

                resultTextarea.value = objStr;
                updatePreview({ name, folder, description, image, platform, price, badge });
            }

            // Функция обновления предпросмотра
            function updatePreview(data) {
                const badgeHtml = data.badge ? `<span class="card-sim-badge">${data.badge}</span>` : '';
                const imageHtml = data.image || '📦';
                const platformHtml = data.platform || 'WEB';
                const priceHtml = data.price === 'FREE' ? 'Бесплатно' : data.price;

                previewDiv.innerHTML = `
                    <div class="card-sim-image">
                        ${imageHtml}
                        ${badgeHtml}
                    </div>
                    <div class="card-sim-content">
                        <div class="card-sim-title">${data.name || 'Без названия'}</div>
                        <div class="card-sim-meta">
                            <span class="card-sim-platform">${platformHtml}</span>
                            <span>🌐 онлайн</span>
                        </div>
                        <div class="card-sim-desc">${data.description || 'Нет описания'}</div>
                        <div class="card-sim-footer">
                            <span class="card-sim-price">${priceHtml}</span>
                            <button class="card-btn" style="background: #66c0f4; border: none; color: #000; padding: 4px 12px; border-radius: 4px; font-weight: 600; cursor: default;">▶ запустить</button>
                        </div>
                    </div>
                `;
            }

            // Обработчики
            generateBtn.addEventListener('click', generateString);

            copyBtn.addEventListener('click', () => {
                resultTextarea.select();
                navigator.clipboard.writeText(resultTextarea.value).then(() => {
                    alert('✅ Строка скопирована!');
                }).catch(() => {
                    // fallback
                    document.execCommand('copy');
                    alert('✅ Скопировано (резерв)');
                });
            });

            fillExampleBtn.addEventListener('click', () => {
                nameInput.value = 'Генератор паролей 2026';
                folderInput.value = 'pass';
                descInput.value = 'Неоновый генератор с военным стилем, 7 категорий символов, бусты, счётчики.';
                imageInput.value = '🔐';
                platformSelect.value = 'WEB';
                priceInput.value = 'FREE';
                badgeInput.value = 'НОВИНКА';
                generateString();
            });

            // Инициализация: сгенерировать при загрузке
            generateString();

            // Автоматическое обновление при изменении полей (по желанию)
            const inputs = [nameInput, folderInput, descInput, imageInput, platformSelect, priceInput, badgeInput];
            inputs.forEach(input => input.addEventListener('input', generateString));
            inputs.forEach(input => input.addEventListener('change', generateString));
        })();
    </script>
</body>
</html>
