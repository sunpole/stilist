<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SUNPOLE HUB — Project View</title>
  <style>
    :root{color-scheme:dark;--bg:#080d18;--panel:#121b2f;--card:#172338;--line:rgba(159,204,255,.16);--text:#f5f7fb;--muted:#9fb0c7;--cyan:#63f3ff;--blue:#66c0f4;--green:#8cffc1;--gold:#d88a42;--gold2:#ffd166;--violet:#b892ff;--red:#ff7b93;--gray:#aeb8c7;--html:#e34c26;--js:#f1e05a;--css:#563d7c}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 10% 0,rgba(99,243,255,.18),transparent 34rem),radial-gradient(circle at 90% 8%,rgba(184,146,255,.14),transparent 28rem),linear-gradient(180deg,#060a12,#0b1120 45%,#0e1526);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif}.wrap{max-width:1260px;margin:0 auto;padding:24px 18px 70px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:#08111d;background:linear-gradient(135deg,var(--cyan),var(--blue));font-weight:950;border-radius:999px;padding:10px 14px;border:0;cursor:pointer}.btn.alt{color:var(--text);background:rgba(255,255,255,.08);border:1px solid var(--line)}.hero{overflow:hidden;border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(23,35,56,.92),rgba(11,17,31,.94));box-shadow:0 24px 80px rgba(0,0,0,.45)}.shot{height:min(56vw,520px);background:#0f1728;position:relative}.shot img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}.noimg{height:100%;display:flex;align-items:center;justify-content:center;font-size:96px;background:linear-gradient(135deg,rgba(102,192,244,.16),rgba(184,146,255,.12))}.content{display:grid;grid-template-columns:1.3fr .7fr;gap:22px;padding:24px}.kicker{color:var(--cyan);font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:12px}.title{font-size:clamp(34px,6vw,72px);line-height:.9;margin:10px 0 12px;letter-spacing:.02em}.desc{color:var(--muted);font-size:17px;line-height:1.65;max-width:780px}.panel{background:rgba(7,11,20,.45);border:1px solid var(--line);border-radius:22px;padding:16px}.grade{font-size:34px;font-weight:950;color:var(--gold2)}.stars{color:var(--gold2);letter-spacing:.08em}.tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}.chip{border:0;background:rgba(255,255,255,.06);color:#cfe3f8;border-radius:999px;padding:5px 9px;font-size:12px}.bars{display:grid;gap:9px;margin-top:12px}.barrow{display:grid;grid-template-columns:110px 1fr 58px;gap:8px;align-items:center;font-size:12px;color:var(--muted)}.track{height:10px;border-radius:999px;background:rgba(255,255,255,.09);overflow:hidden}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 12px rgba(99,243,255,.35)}.fill-quality{background:linear-gradient(90deg,var(--gold),var(--gold2))}.fill-readiness{background:linear-gradient(90deg,#22c55e,var(--green))}.fill-visual{background:linear-gradient(90deg,#0ea5e9,var(--cyan))}.fill-technical{background:linear-gradient(90deg,#7c3aed,var(--violet))}.fill-html{background:var(--html)}.fill-javascript{background:var(--js)}.fill-css{background:var(--css)}.hp{font-weight:900;color:#eafcff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:18px}.mini{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px}.mini b{display:block;margin-bottom:6px}.mini span{color:var(--muted)}.related{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:14px}.rel{display:block;text-decoration:none;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:12px}.footer{margin-top:18px;color:var(--muted);text-align:center;font-size:13px}@media(max-width:850px){.content{grid-template-columns:1fr}.top{flex-wrap:wrap}.shot{height:320px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a class="btn" href="hub-v4.html">← Вернуться в HUB</a><a class="btn alt" href="hub-versions.html">Контрольные версии</a></div>
    <main id="app"></main>
    <div class="footer">SUNPOLE HUB · Project View v0.5.0-alpha</div>
  </div>
  <script src="data/projects-hub.js"></script>
  <script>
    const projects=window.SUNPOLE_PROJECTS||[];
    const id=new URLSearchParams(location.search).get('id')||'3502';
    const p=projects.find(x=>x.id===id)||projects[0];
    const labels={main:'Основной',archive:'Архив',experiment:'Эксперимент',review:'Проверить'};
    function stars(n){return '✶'.repeat(Math.max(1,Math.min(4,n||1)))}
    function img(p){return p.imageUrl||p.fallbackImageUrl||''}
    function bar(label,val,cls=''){val=Number(val||0);return `<div class="barrow"><span>${label}</span><div class="track"><div class="fill ${cls}" style="width:${val}%"></div></div><b class="hp">${val}/100</b></div>`}
    function lang(l){return `<div class="barrow"><span>${l.name}</span><div class="track"><div class="fill fill-${String(l.name).toLowerCase()}" style="width:${l.percent}%"></div></div><b class="hp">${l.percent}%</b></div>`}
    function related(){const ids=new Set(p.related||[]);projects.forEach(x=>{if(x.id!==p.id&&(x.tags||[]).some(t=>(p.tags||[]).includes(t)))ids.add(x.id)});return [...ids].map(id=>projects.find(x=>x.id===id)).filter(Boolean).slice(0,6)}
    document.title=`SUNPOLE HUB — ${p.title}`;
    document.getElementById('app').innerHTML=`<section class="hero"><div class="shot">${img(p)?`<img src="${img(p)}" onerror="this.parentNode.innerHTML='<div class=noimg>${p.icon||'📦'}</div>'">`:`<div class="noimg">${p.icon||'📦'}</div>`}</div><div class="content"><div><div class="kicker">${labels[p.status]||p.status} · ${p.category}</div><h1 class="title">${p.title}</h1><p class="desc">${p.description||p.note||''}</p><div class="tags">${(p.tags||[]).map(t=>`<span class="chip">#${t}</span>`).join('')}</div><div class="grid"><div class="mini"><b>Статус</b><span>${labels[p.status]||p.status}</span></div><div class="mini"><b>Готовность</b><span>${p.maturity}</span></div><div class="mini"><b>Источник</b><span>${p.source||'manual'}</span></div><div class="mini"><b>Версия/связи</b><span>${(p.related||[]).join(', ')||'нет'}</span></div></div></div><aside><div class="panel"><div class="grade">${p.quality?.grade||'C1'} <span class="stars">${stars(p.quality?.stars)}</span></div><div>${p.quality?.label||''}</div>${bar('Качество',p.quality?.score,'fill-quality')}<div class="bars">${bar('Готовность',p.metrics?.readiness,'fill-readiness')}${bar('Визуал',p.metrics?.visual,'fill-visual')}${bar('Техника',p.metrics?.technical,'fill-technical')}${bar('Документы',p.metrics?.documentation)}</div><h3>Languages</h3>${(p.tech?.languages||[]).map(lang).join('')}<div class="grid"><a class="btn" href="${p.launchUrl||p.path}">▶ Открыть проект</a><a class="btn alt" href="${p.links?.source||'#'}">GitHub</a></div></div></aside></div></section><h2>Похожие и связанные проекты</h2><div class="related">${related().map(x=>`<a class="rel" href="project-view.html?id=${x.id}"><b>${x.title}</b><br><span>${x.category} · ${x.quality?.grade||''}</span></a>`).join('')||'<span class="muted">Нет связанных проектов</span>'}</div>`;
  </script>
</body>
</html>
