<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SUNPOLE HUB v0.5.0-alpha</title><style>body{margin:0;background:#080d18;color:#f5f7fb;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif}.wrap{max-width:1200px;margin:auto;padding:28px 18px}.hero{background:linear-gradient(135deg,#172338,#0b111f);border:1px solid rgba(159,204,255,.16);border-radius:28px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45)}h1{font-size:clamp(42px,7vw,84px);line-height:.86;margin:10px 0;text-shadow:0 0 28px rgba(99,243,255,.25)}.lead{color:#9fb0c7;line-height:1.6}.btn{display:inline-flex;text-decoration:none;color:#08111d;background:linear-gradient(135deg,#63f3ff,#66c0f4);font-weight:950;border-radius:999px;padding:10px 14px;margin:4px}.btn.alt{background:rgba(255,255,255,.08);color:#f5f7fb;border:1px solid rgba(159,204,255,.16)}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:22px}.card{background:linear-gradient(180deg,#172338,#18243a);border:1px solid rgba(159,204,255,.16);border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(0,0,0,.28)}.shot{height:190px;background:#101827;overflow:hidden}.shot img{width:100%;height:100%;object-fit:cover;object-position:top center;transition:.4s}.card:hover .shot img{object-fit:contain;background:#07101f}.noimg{height:100%;display:flex;align-items:center;justify-content:center;font-size:58px}.body{padding:16px}.cat{color:#63f3ff;font-size:12px;text-transform:uppercase;font-weight:900;letter-spacing:.08em}.name{font-size:21px;margin:8px 0}.desc{color:#9fb0c7;line-height:1.45;min-height:60px}.tags{display:flex;gap:6px;flex-wrap:wrap}.chip{font-size:11px;background:rgba(255,255,255,.06);border-radius:999px;padding:4px 7px;color:#cfe3f8}.grade{color:#ffd166;font-weight:950;font-size:22px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.toplinks{margin-top:16px}.version{color:#08111d;background:linear-gradient(135deg,#63f3ff,#66c0f4);border-radius:999px;padding:10px 14px;text-decoration:none;font-weight:950}.footer{color:#9fb0c7;text-align:center;margin-top:28px}</style></head><body><div class="wrap"><section class="hero"><div style="color:#63f3ff;font-weight:900;letter-spacing:.18em;text-transform:uppercase;font-size:12px">Connected Storefront / Project View Layer</div><h1>SUNPOLE HUB</h1><p class="lead">Контрольная версия v0.5.0-alpha: карточки теперь ведут не только в сам проект, но и на отдельную страницу-паспорт проекта.</p><div class="toplinks"><a class="version" href="docs/hub-version.html">SUNPOLE HUB v0.5.0-alpha</a><a class="btn alt" href="hub-versions.html">Все версии</a><a class="btn alt" href="hub-v4.html">Сравнение v0.4</a></div></section><main class="grid" id="grid"></main><div class="footer">SUNPOLE HUB v0.5.0-alpha · Project View connected</div></div><script src="data/projects-hub.js"></script><script>const projects=window.SUNPOLE_PROJECTS||[];function stars(n){return'✶'.repeat(Math.max(1,Math.min(4,n||1)))}function img(p){return p.imageUrl||p.fallbackImageUrl||''}document.getElementById('grid').innerHTML=projects.filter(p=>p.isVisible!==false&&p.status!=='archive').map(p=>`<article class="card"><div class="shot">${img(p)?`<img src="${img(p)}" onerror="this.parentNode.innerHTML='<div class=noimg>${p.icon||'📦'}</div>'">`:`<div class="noimg">${p.icon||'📦'}</div>`}</div><div class="body"><div class="cat">${p.category} · ${p.status}</div><h2 class="name">${p.title}</h2><div class="grade">${p.quality?.grade||'C1'} ${stars(p.quality?.stars)}</div><p class="desc">${p.description||p.note||''}</p><div class="tags">${(p.tags||[]).slice(0,6).map(t=>`<span class="chip">#${t}</span>`).join('')}</div><div class="actions"><a class="btn" href="project-view.html?id=${p.id}">Паспорт проекта</a><a class="btn alt" href="${p.launchUrl||p.path}">▶ Открыть</a></div></div></article>`).join('')</script></body></html>
